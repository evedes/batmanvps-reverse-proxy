# getkinfolio — Phoenix app container on the batmanvps network.
# kinfolio.pt / kinfolio.es join this block (or get their own) once registered.
server {
  listen 443 ssl;
  server_name getkinfolio.com;
  # Photo-upload product: LiveView uploads travel over the websocket, but keep
  # HTTP headroom for any future direct POST uploads.
  client_max_body_size 50M;

  access_log /var/log/nginx/getkinfolio.access.log;
  error_log /var/log/nginx/getkinfolio.error.log;

  ssl_certificate /etc/nginx/ssl/getkinfolio/fullchain.pem;
